name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  server-build:
    name: Server TypeScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: server
        run: npm install

      - name: Build
        working-directory: server
        run: npm run build

  web-tests:
    name: Web unit tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Run tests
        working-directory: web
        run: npm test

      - name: Type-check
        working-directory: web
        run: npx tsc --noEmit

      - name: Build
        working-directory: web
        run: npm run build
        env:
          VITE_NAKAMA_HOST: localhost
          VITE_NAKAMA_PORT: '7350'
          VITE_NAKAMA_KEY: defaultkey
          VITE_USE_SSL: 'false'
